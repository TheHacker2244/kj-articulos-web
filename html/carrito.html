<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - K&J Artículos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos del header de la página principal -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Estilos específicos del carrito -->
    <link rel="stylesheet" href="../css/carrito.css">
</head>
<body>

    <!-- Header idéntico al index.html para mantener la coherencia -->
    <header>
        <div class="header-container">
            <a href="../html/index.html" class="logo">
                <img src="../img/Logo.png" alt="Logo K&J">
            </a>
            <nav class="menu-nav">
                <ul>
                    <li><a href="../html/index.html">Inicio</a></li>
                    <li><a href="../html/index.html#catalogo">Productos</a></li>
                    <li><a href="../html/index.html#contacto">Contacto</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="../html/login.html" class="btn-login"><i class="fas fa-user"></i> Iniciar Sesión</a>
                <a href="../html/carrito.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Contenido principal del carrito -->
    <div class="carrito-container">
        <h1>🛒 Mi Carrito de Compras</h1>
        
        <div id="carrito-vacio" style="display: none;">
            <p>Tu carrito está vacío.</p>
            <a href="../html/index.html" class="btn-seguir-comprando">Seguir comprando</a>
        </div>

        <div id="carrito-contenido">
            <!-- Aquí el JS insertará los productos -->
            <div id="lista-productos-carrito"></div>

            <div class="carrito-resumen">
                <h3>Resumen del pedido</h3>
                <p>Total: <span id="total-carrito">$0.00</span></p>
                <button id="btn-finalizar-compra" class="btn-pagar">Finalizar compra por WhatsApp</button>
                <a href="../html/index.html" class="btn-seguir-comprando">Seguir comprando</a>
            </div>
        </div>
    </div>

    <script src="../js/carrito.js"></script>
</body>
</html>
